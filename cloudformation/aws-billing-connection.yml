AWSTemplateFormatVersion: '2010-09-09'
Description: 'Costdoq AWS Billing Connection - Grants Costdoq read-only access to AWS billing and cost data with CUR support'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
    - Label:
        default: Connection Information
      Parameters:
      - ConnectionName
      - CostdoqAccountId
    - Label:
        default: Security
      Parameters:
      - ExternalId
    - Label:
        default: Callback (Auto-filled)
      Parameters:
      - CallbackUrl
    ParameterLabels:
      ConnectionName:
        default: 'Connection Name (descriptive alias for this AWS account)'
      CostdoqAccountId:
        default: 'Costdoq AWS Account ID'
      ExternalId:
        default: 'External ID (for secure cross-account access)'
      CallbackUrl:
        default: 'Costdoq Callback URL (do not modify)'

Parameters:
  ConnectionName:
    Type: String
    Description: 'Descriptive name for this connection (used to identify your account in Costdoq)'
    Default: 'costdoq-billing-connection'
    AllowedPattern: '^[a-z0-9-]+$'
    ConstraintDescription: 'Must be lowercase alphanumeric with hyphens only (3-39 characters). Kept short to fit S3 bucket naming limits.'
    MinLength: 3
    MaxLength: 39

  CostdoqAccountId:
    Type: String
    Description: 'Costdoq AWS Account ID (provided by Costdoq)'
    AllowedPattern: '^[0-9]{12}$'
    ConstraintDescription: 'Must be a valid 12-digit AWS account ID'

  ExternalId:
    Type: String
    Description: 'External ID for secure cross-account access (provided by Costdoq)'
    MinLength: 16
    MaxLength: 1224
    NoEcho: true
    AllowedPattern: '^[a-zA-Z0-9+/=._-]+$'
    ConstraintDescription: 'External ID must contain only alphanumeric characters and safe special characters'

  CallbackUrl:
    Type: String
    Description: 'Costdoq API callback URL (auto-filled, do not modify)'
    Default: ''

Conditions:
  HasCallbackUrl: !Not [!Equals [!Ref CallbackUrl, '']]

Resources:
  CostdoqAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'CostdoqAccessRole-${ConnectionName}'
      Description: !Sub 'Role for Costdoq to access AWS billing and cost data for ${ConnectionName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCostdoqAssumeRole
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${CostdoqAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/job-function/Billing
      Policies:
        - PolicyName: CostdoqCostExplorerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CostExplorerAccess
                Effect: Allow
                Action:
                  - 'ce:GetCostAndUsage'
                  - 'ce:GetCostAndUsageWithResources'
                  - 'ce:GetDimensionValues'
                  - 'ce:GetReservationCoverage'
                  - 'ce:GetReservationPurchaseRecommendation'
                  - 'ce:GetReservationUtilization'
                  - 'ce:GetRightsizingRecommendation'
                  - 'ce:GetSavingsPlansCoverage'
                  - 'ce:GetSavingsPlansPurchaseRecommendation'
                  - 'ce:GetSavingsPlansPurchaseRecommendationDetails'
                  - 'ce:GetSavingsPlansUtilization'
                  - 'ce:GetSavingsPlansUtilizationDetails'
                  - 'ce:GetUsageReport'
                  - 'ce:ListCostCategoryDefinitions'
                  - 'ce:DescribeCostCategoryDefinition'
                  - 'ce:GetCostForecast'
                  - 'ce:GetAnomalies'
                  - 'ce:GetAnomalyMonitors'
                  - 'ce:GetAnomalySubscriptions'
                Resource: '*'
              - Sid: CostAndUsageReportsAccess
                Effect: Allow
                Action:
                  - 'cur:DescribeReportDefinitions'
                  - 'cur:PutReportDefinition'
                  - 'cur:ModifyReportDefinition'
                  - 'cur:DeleteReportDefinition'
                Resource: '*'
              - Sid: BCMDataExportsAccess
                Effect: Allow
                Action:
                  - 'bcm-data-exports:ListTables'
                  - 'bcm-data-exports:CreateExport'
                  - 'bcm-data-exports:GetExport'
                  - 'bcm-data-exports:ListExports'
                  - 'bcm-data-exports:UpdateExport'
                  - 'bcm-data-exports:DeleteExport'
                Resource: '*'
        - PolicyName: CostdoqCURBucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CURBucketManage
                Effect: Allow
                Action:
                  - 's3:CreateBucket'
                  - 's3:PutBucketPolicy'
                  - 's3:PutBucketTagging'
                  - 's3:PutEncryptionConfiguration'
                  - 's3:PutLifecycleConfiguration'
                  - 's3:PutBucketPublicAccessBlock'
                  - 's3:GetBucketLocation'
                  - 's3:GetBucketPolicy'
                Resource:
                  - !Sub 'arn:aws:s3:::costdoq-cur-${AWS::AccountId}-${ConnectionName}'
              - Sid: CURBucketReadWrite
                Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                  - 's3:DeleteObject'
                Resource:
                  - !Sub 'arn:aws:s3:::costdoq-cur-${AWS::AccountId}-${ConnectionName}'
                  - !Sub 'arn:aws:s3:::costdoq-cur-${AWS::AccountId}-${ConnectionName}/*'
        - PolicyName: CostdoqStackSelfCleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudFormationSelfDelete
                Effect: Allow
                Action:
                  - 'cloudformation:DeleteStack'
                  - 'cloudformation:DescribeStacks'
                Resource: !Sub 'arn:aws:cloudformation:*:${AWS::AccountId}:stack/${ConnectionName}/*'
              - Sid: IAMRoleSelfDelete
                Effect: Allow
                Action:
                  - 'iam:DeleteRole'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:ListRolePolicies'
                  - 'iam:ListAttachedRolePolicies'
                Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/CostdoqAccessRole-${ConnectionName}'
        - PolicyName: CostdoqOrganizationsAndMonitoring
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: OrganizationsAccess
                Effect: Allow
                Action:
                  - 'organizations:DescribeOrganization'
                  - 'organizations:DescribeAccount'
                  - 'organizations:DescribeOrganizationalUnit'
                  - 'organizations:ListAccounts'
                  - 'organizations:ListOrganizationalUnitsForParent'
                  - 'organizations:ListParents'
                  - 'organizations:ListRoots'
                  - 'organizations:ListTagsForResource'
                Resource: '*'
              - Sid: CloudWatchMetricsAccess
                Effect: Allow
                Action:
                  - 'cloudwatch:GetMetricData'
                  - 'cloudwatch:ListMetrics'
                  - 'cloudwatch:GetMetricStatistics'
                Resource: '*'
              - Sid: EC2ReadAccess
                Effect: Allow
                Action:
                  - 'ec2:DescribeInstances'
                  - 'ec2:DescribeRegions'
                Resource: '*'
              - Sid: TaggingAccess
                Effect: Allow
                Action:
                  - 'tag:GetResources'
                  - 'tag:GetTagKeys'
                  - 'tag:GetTagValues'
                Resource: '*'
      MaxSessionDuration: 3600
      Tags:
        - Key: ManagedBy
          Value: Costdoq
        - Key: Purpose
          Value: BillingDataAccess
        - Key: ConnectionName
          Value: !Ref ConnectionName
        - Key: CreatedBy
          Value: CloudFormation
        - Key: CostdoqAccountId
          Value: !Ref CostdoqAccountId

  # S3 bucket for CUR 2.0 Data Exports — created via Lambda to avoid failure
  # when the bucket already exists (e.g. stack re-creation after deletion with
  # DeletionPolicy: Retain).
  CostdoqCURBucketCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'CostdoqCURBucketRole-${ConnectionName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3BucketManage
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:CreateBucket'
                  - 's3:ListBucket'
                  - 's3:PutBucketPolicy'
                  - 's3:PutBucketTagging'
                  - 's3:PutEncryptionConfiguration'
                  - 's3:PutLifecycleConfiguration'
                  - 's3:PutBucketPublicAccessBlock'
                Resource:
                  - !Sub 'arn:aws:s3:::costdoq-cur-${AWS::AccountId}-${ConnectionName}'
      Tags:
        - Key: ManagedBy
          Value: Costdoq

  CostdoqCURBucketCreator:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'costdoq-bucket-${ConnectionName}'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt CostdoqCURBucketCreatorRole.Arn
      Tags:
        - Key: ManagedBy
          Value: Costdoq
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3
          from botocore.exceptions import ClientError

          def send_cfn_response(event, context, status, reason="", data={}):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": event.get("PhysicalResourceId", context.log_stream_name),
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"], data=body,
                  headers={"Content-Type": ""}, method="PUT",
              )
              urllib.request.urlopen(req)

          def handler(event, context):
              print(json.dumps({"RequestType": event["RequestType"]}))
              props = event["ResourceProperties"]
              bucket_name = props["BucketName"]

              if event["RequestType"] == "Delete":
                  # Never delete the bucket — it has DeletionPolicy Retain semantics
                  send_cfn_response(event, context, "SUCCESS", "Bucket retained", {"BucketName": bucket_name})
                  return

              s3 = boto3.client("s3")
              region = boto3.session.Session().region_name or "us-east-1"
              try:
                  s3.head_bucket(Bucket=bucket_name)
                  print(f"Bucket {bucket_name} already exists, skipping creation")
              except ClientError as e:
                  code = e.response["Error"]["Code"]
                  if code in ("404", "NoSuchBucket"):
                      print(f"Creating bucket {bucket_name} in {region}")
                      params = {"Bucket": bucket_name}
                      if region != "us-east-1":
                          params["CreateBucketConfiguration"] = {"LocationConstraint": region}
                      s3.create_bucket(**params)
                  else:
                      send_cfn_response(event, context, "FAILED", str(e))
                      return

              # Apply configuration regardless (idempotent)
              try:
                  s3.put_public_access_block(Bucket=bucket_name, PublicAccessBlockConfiguration={
                      "BlockPublicAcls": True, "IgnorePublicAcls": True,
                      "BlockPublicPolicy": True, "RestrictPublicBuckets": True,
                  })
                  s3.put_bucket_encryption(Bucket=bucket_name, ServerSideEncryptionConfiguration={
                      "Rules": [{"ApplyServerSideEncryptionByDefault": {"SSEAlgorithm": "AES256"}}]
                  })
                  s3.put_bucket_lifecycle_configuration(Bucket=bucket_name, LifecycleConfiguration={
                      "Rules": [{"ID": "ExpireOldReports", "Status": "Enabled",
                                 "Expiration": {"Days": 400}, "Filter": {"Prefix": ""}}]
                  })
                  s3.put_bucket_tagging(Bucket=bucket_name, Tagging={"TagSet": [
                      {"Key": "ManagedBy", "Value": "Costdoq"},
                      {"Key": "Purpose", "Value": "CostAndUsageReports"},
                      {"Key": "ConnectionName", "Value": props.get("ConnectionName", "")},
                  ]})
              except Exception as e:
                  print(f"Config warning: {e}")

              # Apply bucket policy (idempotent PUT)
              try:
                  account_id = props.get("AccountId", "")
                  costdoq_account_id = props.get("CostdoqAccountId", "")
                  bucket_arn = f"arn:aws:s3:::{bucket_name}"
                  policy = {
                      "Version": "2012-10-17",
                      "Statement": [
                          {
                              "Sid": "AllowBCMDataExportsWrite",
                              "Effect": "Allow",
                              "Principal": {"Service": "bcm-data-exports.amazonaws.com"},
                              "Action": ["s3:PutObject", "s3:GetBucketPolicy"],
                              "Resource": [bucket_arn, f"{bucket_arn}/*"],
                              "Condition": {
                                  "StringEquals": {"aws:SourceAccount": account_id},
                                  "ArnLike": {"aws:SourceArn": f"arn:aws:bcm-data-exports:us-east-1:{account_id}:export/*"},
                              },
                          },
                          {
                              "Sid": "AllowCostdoqCrossAccountRead",
                              "Effect": "Allow",
                              "Principal": {"AWS": f"arn:aws:iam::{costdoq_account_id}:root"},
                              "Action": ["s3:GetObject", "s3:ListBucket", "s3:GetBucketLocation"],
                              "Resource": [bucket_arn, f"{bucket_arn}/*"],
                          },
                      ],
                  }
                  s3.put_bucket_policy(Bucket=bucket_name, Policy=json.dumps(policy))
                  print("Bucket policy applied")
              except Exception as e:
                  print(f"Bucket policy warning: {e}")

              send_cfn_response(event, context, "SUCCESS", "Bucket ready", {"BucketName": bucket_name})

  CostdoqCURBucket:
    Type: Custom::S3Bucket
    Properties:
      ServiceToken: !GetAtt CostdoqCURBucketCreator.Arn
      BucketName: !Sub 'costdoq-cur-${AWS::AccountId}-${ConnectionName}'
      ConnectionName: !Ref ConnectionName
      AccountId: !Ref AWS::AccountId
      CostdoqAccountId: !Ref CostdoqAccountId

  # CUR 2.0 Data Export is created via the Costdoq API after the stack is deployed.
  # This avoids rollback of the entire stack if the BCM export creation fails.

  # Lambda function that notifies Costdoq API when the stack is created
  CostdoqCallbackRole:
    Type: AWS::IAM::Role
    Condition: HasCallbackUrl
    Properties:
      RoleName: !Sub 'CostdoqCallbackRole-${ConnectionName}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Tags:
        - Key: ManagedBy
          Value: Costdoq

  CostdoqCallbackFunction:
    Type: AWS::Lambda::Function
    Condition: HasCallbackUrl
    Properties:
      FunctionName: !Sub 'costdoq-callback-${ConnectionName}'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt CostdoqCallbackRole.Arn
      Tags:
        - Key: ManagedBy
          Value: Costdoq
      Code:
        ZipFile: |
          import json
          import urllib.request
          import urllib.error

          def send_cfn_response(event, context, status, reason=""):
              body = json.dumps({
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
              }).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=body,
                  headers={"Content-Type": ""},
                  method="PUT",
              )
              urllib.request.urlopen(req)

          def handler(event, context):
              print(json.dumps({"RequestType": event["RequestType"], "Props": event.get("ResourceProperties", {})}))
              # Only notify on Create (not Update/Delete)
              if event["RequestType"] != "Create":
                  send_cfn_response(event, context, "SUCCESS", "Skipped (not a Create)")
                  return

              props = event["ResourceProperties"]
              callback_url = props.get("CallbackUrl", "")
              if not callback_url:
                  send_cfn_response(event, context, "SUCCESS", "No callback URL")
                  return

              payload = json.dumps({
                  "accountId": props.get("AccountId", ""),
                  "externalId": props.get("ExternalId", ""),
                  "roleArn": props.get("RoleArn", ""),
                  "connectionName": props.get("ConnectionName", ""),
                  "region": props.get("Region", "us-east-1"),
                  "stackName": props.get("StackName", ""),
              }).encode("utf-8")

              try:
                  req = urllib.request.Request(
                      callback_url,
                      data=payload,
                      headers={"Content-Type": "application/json"},
                      method="POST",
                  )
                  resp = urllib.request.urlopen(req, timeout=25)
                  result = resp.read().decode("utf-8")
                  print(f"Callback success: {resp.status} {result}")
              except urllib.error.HTTPError as e:
                  print(f"Callback HTTP error: {e.code} {e.read().decode('utf-8', errors='replace')}")
              except Exception as e:
                  print(f"Callback error: {e}")
              # Always succeed — callback failure should not roll back the stack
              send_cfn_response(event, context, "SUCCESS", "Callback sent")

  NotifyCostdoq:
    Type: Custom::CostdoqCallback
    Condition: HasCallbackUrl
    DependsOn: CostdoqAccessRole
    Properties:
      ServiceToken: !GetAtt CostdoqCallbackFunction.Arn
      CallbackUrl: !Ref CallbackUrl
      AccountId: !Ref AWS::AccountId
      ExternalId: !Ref ExternalId
      RoleArn: !GetAtt CostdoqAccessRole.Arn
      ConnectionName: !Ref ConnectionName
      Region: !Ref AWS::Region
      StackName: !Ref AWS::StackName

Outputs:
  RoleArn:
    Description: 'ARN of the IAM role that Costdoq will use to access your AWS account'
    Value: !GetAtt CostdoqAccessRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  ConnectionName:
    Description: 'Name of this connection'
    Value: !Ref ConnectionName
    Export:
      Name: !Sub '${AWS::StackName}-ConnectionName'

  AccountId:
    Description: 'AWS Account ID where this stack is deployed'
    Value: !Ref AWS::AccountId
    Export:
      Name: !Sub '${AWS::StackName}-AccountId'

  StackName:
    Description: 'CloudFormation stack name'
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub '${AWS::StackName}-StackName'

  Region:
    Description: 'AWS Region where this stack is deployed'
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${AWS::StackName}-Region'

  CURBucketName:
    Description: 'S3 bucket for CUR 2.0 Data Exports'
    Value: !Sub 'costdoq-cur-${AWS::AccountId}-${ConnectionName}'
    Export:
      Name: !Sub '${AWS::StackName}-CURBucket'

