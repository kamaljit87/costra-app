apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: costdoq-ingress
  namespace: costdoq
  labels:
    app: costdoq
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: costdoq-compress@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - costdoq.com
      secretName: costdoq-tls
    - hosts:
        - app.costdoq.com
      secretName: costdoq-app-tls
  rules:
    # Marketing site + contact API
    - host: costdoq.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: costdoq-backend
                port:
                  number: 3002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: costdoq-frontend
                port:
                  number: 8080
    # App dashboard + full API
    - host: app.costdoq.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: costdoq-backend
                port:
                  number: 3002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: costdoq-frontend
                port:
                  number: 8080
