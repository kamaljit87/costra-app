apiVersion: apps/v1
kind: Deployment
metadata:
  name: costdoq-frontend
  namespace: costdoq
  labels:
    app: costdoq
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: costdoq
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: costdoq
        component: frontend
    spec:
      containers:
        - name: frontend
          image: 005878674861.dkr.ecr.us-east-1.amazonaws.com/costdoq-frontend:92e1fc8
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: costdoq
                    component: frontend
                topologyKey: kubernetes.io/hostname
